name: Production Deployment

on:
  push:
    branches: [ "C-sharp-Ang" ]
  workflow_dispatch: # Allows manual trigger

permissions:
  id-token: write # Required for requesting the OIDC JWT
  contents: read  # Required for checkout

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      # Build & Push Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend_dotnet/MacroDashboard.Backend/Dockerfile
          push: true
          tags: ${{ secrets.ACR_NAME }}.azurecr.io/macro-backend:${{ github.sha }}, ${{ secrets.ACR_NAME }}.azurecr.io/macro-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & Push Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend_angular/Dockerfile
          push: true
          tags: ${{ secrets.ACR_NAME }}.azurecr.io/macro-frontend:${{ github.sha }}, ${{ secrets.ACR_NAME }}.azurecr.io/macro-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Backend to Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          images: ${{ secrets.ACR_NAME }}.azurecr.io/macro-backend:${{ github.sha }}

      - name: Deploy Frontend to Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_APP_NAME }}
          images: ${{ secrets.ACR_NAME }}.azurecr.io/macro-frontend:${{ github.sha }}
