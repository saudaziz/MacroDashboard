services:
  backend:
    build:
      context: .
      dockerfile: backend_dotnet/MacroDashboard.Backend/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - AI__ApiKey=${AI_API_KEY}
      - AI__Endpoint=${AI_ENDPOINT}
      - AI__ModelName=${AI_MODEL_NAME}
      - Fred__ApiKey=${FRED_API_KEY}
    networks:
      - macro-network

  frontend:
    build:
      context: .
      dockerfile: frontend_angular/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - macro-network

networks:
  macro-network:
    driver: bridge
